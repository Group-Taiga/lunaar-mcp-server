name: Release

# Triggered manually OR by pushing a SemVer tag (e.g. `v0.1.1`).
# Manual dispatch is useful for republishing a yanked version or testing the
# pipeline; tag-driven publishing is the canonical path.
on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to bump to (e.g. 0.2.0). Empty = use current package.json version."
        required: false
        type: string

permissions:
  contents: write   # for tag creation when invoked manually

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          scope: "@lunaar"

      - name: Optional version bump (manual dispatch only)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.version != ''
        run: |
          npm version "${{ github.event.inputs.version }}" --no-git-tag-version
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git commit -m "Release v${{ github.event.inputs.version }}"
          git tag "v${{ github.event.inputs.version }}"
          git push origin HEAD:${{ github.ref_name }} --follow-tags

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify package contents
        run: npm pack --dry-run

      - name: Publish to npm
        run: npm publish --access public --provenance
        env:
          # Granular automation token (Bypass 2FA = ON, scope = @lunaar/mcp-server, write).
          # Stored as repository secret. Rotate from https://www.npmjs.com/settings/<user>/tokens
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
